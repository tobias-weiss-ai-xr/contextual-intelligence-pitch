<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="growthGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>
  <rect x="0" y="0" width="1920" height="4" fill="url(#accent)"/>

  <g transform="translate(40, 30) scale(0.35)">
    <polygon points="140,0 260,75 260,225 140,300 20,225 20,75" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.25"/>
    <circle cx="140" cy="150" r="28" fill="url(#accent)" opacity="0.4"/>
  </g>

  <text x="960" y="130" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="12" text-anchor="middle" filter="url(#glow)">REVENUE STREAMS</text>
  <rect x="740" y="150" width="440" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- LEFT: Pricing tiers -->
  <!-- Tier 1 -->
  <rect x="40" y="290" width="440" height="100" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="75" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#06b6d4" letter-spacing="3">LEAD INTELLIGENCE</text>
  <text x="440" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="end">€299</text>
  <text x="440" y="365" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#94a3b8" text-anchor="end">/Monat</text>

  <!-- Tier 2 -->
  <rect x="40" y="410" width="440" height="100" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="75" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#6366f1" letter-spacing="3">ENTERPRISE</text>
  <text x="440" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="end">€1.000+</text>
  <text x="440" y="485" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#94a3b8" text-anchor="end">/Monat</text>

  <!-- Tier 3 - dimmed/planned -->
  <rect x="40" y="530" width="440" height="90" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.15"/>
  <text x="75" y="570" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="2">GRANT INTELLIGENCE (GEPLANT Q3 2027)</text>
  <text x="440" y="570" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="700" fill="#64748b" text-anchor="end">€49–€149</text>
  <text x="440" y="595" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#475569" text-anchor="end">/Monat</text>

  <!-- MIDDLE: MOAT cards -->
  <rect x="540" y="290" width="420" height="180" rx="10" fill="url(#accent)" opacity="0.06" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.25"/>
  <text x="750" y="350" font-family="'Segoe UI',Arial,sans-serif" font-size="32" font-weight="600" fill="#06b6d4" text-anchor="middle">ORSD</text>
  <text x="750" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Open Standard · Community</text>

  <rect x="540" y="490" width="420" height="180" rx="10" fill="url(#accent)" opacity="0.04" stroke="#6366f1" stroke-width="1" stroke-opacity="0.2"/>
  <text x="750" y="550" font-family="'Segoe UI',Arial,sans-serif" font-size="32" font-weight="600" fill="#6366f1" text-anchor="middle">CRS</text>
  <text x="750" y="590" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Open Schema · Proprietäres Scoping</text>

  <!-- RIGHT: Financial projection -->
  <rect x="1060" y="290" width="820" height="280" rx="12" fill="#1e293b" opacity="0.5"/>

  <text x="1470" y="330" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="#22c55e" letter-spacing="5" text-anchor="middle">FINANZIELLE PROJEKTION</text>

  <!-- Sparkline -->
  <polyline points="1100,420 1150,415 1200,410 1270,395 1340,378 1410,370 1480,358 1550,340" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.3"/>

  <!-- Y1 -->
  <rect x="1100" y="450" width="220" height="100" rx="8" fill="#06b6d4" opacity="0.06" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.2"/>
  <text x="1210" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#06b6d4" text-anchor="middle">Y1</text>
  <text x="1210" y="525" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">€9–18k</text>

  <!-- Y3 -->
  <rect x="1350" y="445" width="240" height="105" rx="8" fill="#6366f1" opacity="0.08" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1470" y="478" font-family="'Segoe UI',Arial,sans-serif" font-size="32" font-weight="700" fill="#6366f1" text-anchor="middle">Y3</text>
  <text x="1470" y="528" font-family="'Segoe UI',Arial,sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">€144–288k</text>

  <!-- Y5 -->
  <rect x="1620" y="450" width="220" height="100" rx="8" fill="#06b6d4" opacity="0.05" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.15"/>
  <text x="1730" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#06b6d4" text-anchor="middle">Y5</text>
  <text x="1730" y="525" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">€1,0–2,5M</text>

  <!-- Bottom bar -->
  <rect x="1060" y="600" width="820" height="80" rx="8" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1" stroke-opacity="0.2"/>
  <text x="1470" y="640" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="3">UNIT ECONOMICS</text>
  <text x="1470" y="668" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">CAC ~€400 · LTV/CAC &gt;5:1 · Payback 3 Mo. · GM 93%</text>

  <rect x="0" y="1030" width="1920" height="50" fill="#0f172a"/>
  <text x="960" y="1060" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#475569" text-anchor="middle">contextual-intelligence.org</text>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
