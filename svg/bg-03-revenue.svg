  <text x="1530" y="845" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#cbd5e1">Payback 3 Mo.</text>
  <text x="1530" y="875" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#cbd5e1">GM 93%</text>

  <!-- Footer -->
