<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="bgBlur"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
      <stop offset="40%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <circle cx="350" cy="300" r="280" fill="#06b6d4" opacity="0.05" filter="url(#bgBlur)"/>
  <circle cx="1500" cy="650" r="250" fill="#6366f1" opacity="0.04" filter="url(#bgBlur)"/>
  <circle cx="960" cy="850" r="200" fill="#22c55e" opacity="0.03" filter="url(#bgBlur)"/>

  <!-- Logo -->
  <g transform="translate(150, 55)">
    <polygon points="0,-40 70,-20 70,20 0,40 -70,20 -70,-20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
    <circle cx="0" cy="0" r="18" fill="url(#accent)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="7" fill="#ffffff" opacity="0.9"/>
  </g>
  <text x="150" y="115" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="3" text-anchor="middle">CONTEXTUAL INTELLIGENCE</text>
  <text x="150" y="132" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#64748b" text-anchor="middle">orsd.contextual-intelligence.org</text>

  <!-- Title -->
  <text x="960" y="70" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="8" text-anchor="middle">GESCHÄFTSMODELL</text>
  <rect x="810" y="85" width="300" height="2" fill="url(#accent)" rx="1"/>

  <!-- Separator lines -->
  <line x1="420" y1="120" x2="420" y2="1000" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
  <line x1="1500" y1="120" x2="1500" y2="1000" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- LEFT: GTM STRATEGIE -->
  <text x="245" y="180" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#06b6d4" letter-spacing="3" text-anchor="middle">GTM STRATEGIE</text>

  <!-- SIEMENS -->
  <circle cx="150" cy="270" r="14" fill="#06b6d4" opacity="0.3"/>
  <text x="150" y="277" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">★</text>
  <text x="180" y="277" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#e2e8f0">SIEMENS</text>
  <text x="180" y="310" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#cbd5e1">Referenzkunde</text>
  <text x="180" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#cbd5e1">MedTech</text>

