  <rect x="725" y="15" width="340" height="130" rx="8" fill="#0f172a" opacity="0.92" stroke="#6366f1" stroke-width="1"/>
  <text x="741" y="41" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#06b6d4">PRODUKTIONS-REFERENZ</text>
  <text x="741" y="63" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">Format:      1080 × 1920 (9:16)</text>
  <text x="741" y="81" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">Zone:        x 190–890 · y 350–1350</text>
  <text x="741" y="99" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">Größe:       700 × 1000 px</text>
  <text x="741" y="117" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">Zentrum:     x=540 / y=850</text>
  <text x="741" y="135" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">Folie:       bg-07-wer-was-cta</text>

  <!-- ============ VERIFIKATIONS-CHECKLISTE ============ -->
  <rect x="15" y="115" width="340" height="70" rx="8" fill="#0f172a" opacity="0.92" stroke="#22c55e" stroke-width="1"/>
  <text x="31" y="139" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#22c55e" letter-spacing="1">✓ CHECKLISTE</text>
  <line x1="31" y1="149" x2="335" y2="149" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <text x="45" y="167" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e2e8f0">◻ bg-07-wer-was-cta.svg — Zone frei?</text>

  <!-- ============ UNTEN: ANLEITUNG ============ -->
  <rect x="40" y="1500" width="1000" height="50" rx="8" fill="#0f172a" opacity="0.9" stroke="#06b6d4" stroke-width="1"/>
  <text x="540" y="1521" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">
    <tspan font-weight="700" fill="#06b6d4">VERWENDUNG: </tspan>
    Overlay über bg-07 legen. <tspan font-weight="700" fill="#fbbf24"> opacity: 1.0 </tspan>
    prüfen. Danach <tspan font-weight="700" fill="#22c55e"> opacity: 0.0 </tspan>.
  </text>

  <!-- ============ FUSSZEILE ============ -->
  <text x="540" y="1850" font-family="'Courier New',monospace" font-size="10" fill="#475569" text-anchor="middle">Overlay Mobile v1.0 — Contextual Intelligence — BMC 2026 — 1080×1920</text>
</svg>
