<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ================================================================ -->
  <!-- SPEAKER ZONE MOBIL: x=190 bis x=890 | y=350 bis y=1350          -->
  <!-- 700 px breit × 1000 px hoch · zentriert bei x=540                -->
  <!-- Alle Mobil-Pitch-SVGs lassen diese Zone KOMPLETT FREI.           -->
  <!-- ================================================================ -->

  <rect x="0" y="0" width="1080" height="1920" fill="#0f172a" opacity="0.35"/>

  <!-- ============ ÄUSSERER RAHMEN ============ -->
  <rect x="190" y="350" width="700" height="1000" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="14,8" opacity="0.9"/>
  <rect x="194" y="354" width="692" height="992" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="14,8" opacity="0.6"/>
  <rect x="198" y="358" width="684" height="984" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="14,8" opacity="0.3"/>

  <!-- ============ ECKEN-MARKIERUNGEN ============ -->
  <g stroke="#ef4444" stroke-width="3" opacity="0.95">
    <line x1="185" y1="350" x2="250" y2="350"/>
    <line x1="190" y1="345" x2="190" y2="410"/>
    <line x1="890" y1="350" x2="830" y2="350"/>
    <line x1="890" y1="345" x2="890" y2="410"/>
    <line x1="185" y1="1350" x2="250" y2="1350"/>
    <line x1="190" y1="1355" x2="190" y2="1290"/>
    <line x1="890" y1="1350" x2="830" y2="1350"/>
    <line x1="890" y1="1355" x2="890" y2="1290"/>
  </g>

  <!-- ============ PERSONEN-SILHOUETTE ============ -->
  <g transform="translate(540, 0)" opacity="0.95" filter="url(#softGlow)">
    <path d="M -80,1340 L -90,1200 Q -95,1150 -80,1100 L -70,1050 Q -60,1010 -40,990
             L -30,970 Q -20,950 -10,940 L -5,930
             Q 0,925 0,925
             Q 0,925 5,930 L 10,940
             Q 20,950 30,970 L 40,990
             Q 60,1010 70,1050 L 80,1100
             Q 95,1150 90,1200 L 80,1340 Z"
          fill="url(#personGrad)" stroke="#06b6d4" stroke-width="3" opacity="0.95"/>
    <ellipse cx="0" cy="870" rx="55" ry="65" fill="url(#personGrad)" stroke="#06b6d4" stroke-width="3" opacity="0.95"/>
    <rect x="-18" y="925" width="36" height="25" rx="8" fill="url(#personGrad)" stroke="#06b6d4" stroke-width="2" opacity="0.85"/>
    <circle cx="-18" cy="860" r="5" fill="#06b6d4" opacity="0.9"/>
    <circle cx="18" cy="860" r="5" fill="#06b6d4" opacity="0.9"/>
    <line x1="25" y1="960" x2="45" y2="990" stroke="#06b6d4" stroke-width="2" opacity="0.85"/>
    <circle cx="45" cy="993" r="4" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.85"/>
    <path d="M 45,993 Q 55,1010 60,1050" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- ============ HORIZONTALE MITTELLINIE ============ -->
  <line x1="190" y1="850" x2="890" y2="850" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
  <line x1="530" y1="850" x2="550" y2="850" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>
  <text x="895" y="854" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24" opacity="0.7">y=850</text>

  <!-- ============ VERTIKALE MITTELLINIE ============ -->
  <line x1="540" y1="350" x2="540" y2="1350" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
  <text x="542" y="365" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24" opacity="0.7">x=540</text>

  <!-- ============ MASS-ANGABEN ============ -->
  <line x1="190" y1="330" x2="890" y2="330" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="190" y1="325" x2="190" y2="335" stroke="#94a3b8" stroke-width="1" opacity="0.7"/>
  <line x1="890" y1="325" x2="890" y2="335" stroke="#94a3b8" stroke-width="1" opacity="0.7"/>
  <text x="540" y="325" font-family="'Courier New',monospace" font-size="12" fill="#94a3b8" text-anchor="middle">700 px</text>

  <line x1="170" y1="350" x2="170" y2="1350" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="165" y1="350" x2="175" y2="350" stroke="#94a3b8" stroke-width="1" opacity="0.7"/>
  <line x1="165" y1="1350" x2="175" y2="1350" stroke="#94a3b8" stroke-width="1" opacity="0.7"/>
  <text x="165" y="858" font-family="'Courier New',monospace" font-size="12" fill="#94a3b8" text-anchor="end" transform="rotate(-90, 165, 858)">1000 px</text>

  <!-- ============ SAFE ZONE (90%) ============ -->
  <rect x="225" y="395" width="630" height="910" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,8" opacity="0.35"/>
  <text x="225" y="390" font-family="'Courier New',monospace" font-size="9" fill="#22c55e" opacity="0.4">Safe Zone (90%)</text>

  <!-- ============ CONTROL-INFO ============ -->
  <rect x="15" y="15" width="340" height="82" rx="8" fill="#0f172a" opacity="0.92" stroke="#ef4444" stroke-width="2"/>
  <text x="31" y="41" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="900" fill="#ef4444" letter-spacing="2">⚠ SPEAKER OVERLAY</text>
  <text x="31" y="61" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#e2e8f0">Mobil 1080×1920 · Greenscreen</text>
  <text x="31" y="81" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#fbbf24" font-weight="600">Zone: x 190–890 · y 350–1350</text>

