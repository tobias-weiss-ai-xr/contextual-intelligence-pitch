<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="cardLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="cardDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>

  <rect x="0" y="0" width="1920" height="4" fill="url(#accent)"/>

  <g transform="translate(40, 30) scale(0.35)">
    <polygon points="140,0 260,75 260,225 140,300 20,225 20,75" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.25"/>
    <circle cx="140" cy="150" r="28" fill="url(#accent)" opacity="0.4"/>
    <circle cx="140" cy="150" r="10" fill="#ffffff" opacity="0.4"/>
    <circle cx="140" cy="55" r="12" fill="#06b6d4" opacity="0.4"/>
    <circle cx="225" cy="103" r="10" fill="#6366f1" opacity="0.3"/>
    <circle cx="225" cy="197" r="10" fill="#06b6d4" opacity="0.3"/>
    <circle cx="140" cy="245" r="12" fill="#6366f1" opacity="0.4"/>
    <circle cx="55" cy="197" r="10" fill="#06b6d4" opacity="0.3"/>
    <circle cx="55" cy="103" r="10" fill="#6366f1" opacity="0.3"/>
  </g>

  <text x="960" y="130" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="10" text-anchor="middle">MARKT &amp; ZIELGRUPPEN</text>
  <rect x="740" y="150" width="440" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Customer segments - 2x2 grid, simplified -->
  <!-- S - Deep-Tech-Startups -->
  <rect x="40" y="280" width="440" height="180" rx="12" fill="url(#cardLight)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="75" cy="320" r="18" fill="#06b6d4" opacity="0.3"/>
  <text x="75" y="326" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">S</text>
  <text x="110" y="326" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Deep-Tech-Startups</text>
  <text x="75" y="390" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#06b6d4">~4.000</text>
  <text x="75" y="430" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#94a3b8">in DACH</text>

  <!-- U - Unis & Forschung -->
  <rect x="520" y="280" width="440" height="180" rx="12" fill="url(#cardDark)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="555" cy="320" r="18" fill="#6366f1" opacity="0.3"/>
  <text x="555" y="326" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">U</text>
  <text x="590" y="326" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Unis &amp; Forschung</text>
  <text x="555" y="390" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#6366f1">~1.000</text>
  <text x="555" y="430" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#94a3b8">Institute in DACH</text>

  <!-- K - KMU mit FuE -->
  <rect x="40" y="500" width="440" height="180" rx="12" fill="url(#cardDark)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="75" cy="540" r="18" fill="#6366f1" opacity="0.3"/>
  <text x="75" y="546" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">K</text>
  <text x="110" y="546" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">KMU mit FuE</text>
  <text x="75" y="610" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#6366f1">~15.000</text>
  <text x="75" y="650" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#94a3b8">in DACH</text>

  <!-- B - B2B-Vertriebsteams (MedTech) -->
  <rect x="520" y="500" width="440" height="180" rx="12" fill="url(#cardLight)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="555" cy="540" r="18" fill="#06b6d4" opacity="0.3"/>
  <text x="555" y="546" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">B</text>
  <text x="590" y="546" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">B2B-Vertrieb (MedTech)</text>
  <text x="555" y="610" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#06b6d4">~5.000</text>
  <text x="555" y="650" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#94a3b8">Teams in DACH</text>

  <!-- TAM/SAM/SOM - right side big numbers -->
  <rect x="1060" y="280" width="400" height="150" rx="12" fill="#06b6d4" opacity="0.08" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1260" y="325" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="3">TAM</text>
  <text x="1260" y="390" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">€1,15 Mrd.</text>

  <rect x="1060" y="460" width="400" height="150" rx="12" fill="#6366f1" opacity="0.08" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1260" y="505" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#6366f1" text-anchor="middle" letter-spacing="3">SAM</text>
  <text x="1260" y="570" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">€34–121 Mio.</text>

  <rect x="1060" y="640" width="400" height="130" rx="12" fill="url(#accent)" opacity="0.1" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1260" y="680" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="3">SOM Y3</text>
  <text x="1260" y="740" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">€144–288k</text>

  <!-- Bottom row: pricing -->
  <rect x="1060" y="800" width="400" height="80" rx="12" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1260" y="835" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="3">PREISE</text>
  <text x="1260" y="865" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">€299–€1.000 / Monat</text>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
