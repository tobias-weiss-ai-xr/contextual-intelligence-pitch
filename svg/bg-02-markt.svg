<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="bgBlur"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
      <stop offset="40%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <circle cx="300" cy="400" r="280" fill="#06b6d4" opacity="0.05" filter="url(#bgBlur)"/>
  <circle cx="1620" cy="500" r="250" fill="#6366f1" opacity="0.04" filter="url(#bgBlur)"/>

  <!-- Logo -->
  <g transform="translate(1770, 55)">
    <polygon points="0,-48 84,-24 84,24 0,48 -84,24 -84,-24" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
    <circle cx="0" cy="0" r="22" fill="url(#accent)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="9" fill="#ffffff" opacity="0.9"/>
