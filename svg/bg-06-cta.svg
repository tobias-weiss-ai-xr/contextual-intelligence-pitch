<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="votingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="bgBlur"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
      <stop offset="40%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <circle cx="350" cy="350" r="280" fill="#22c55e" opacity="0.04" filter="url(#bgBlur)"/>
  <circle cx="1500" cy="650" r="250" fill="#06b6d4" opacity="0.04" filter="url(#bgBlur)"/>

  <!-- Logo -->
  <g transform="translate(1770, 55)">
    <polygon points="0,-48 84,-24 84,24 0,48 -84,24 -84,-24" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
    <circle cx="0" cy="0" r="22" fill="url(#accent)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="9" fill="#ffffff" opacity="0.9"/>
  </g>
  <text x="1770" y="120" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="3" text-anchor="middle">CONTEXTUAL INTELLIGENCE</text>
  <text x="1770" y="138" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#64748b" text-anchor="middle">orsd.contextual-intelligence.org</text>

  <!-- Title -->
  <text x="960" y="70" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="6" text-anchor="middle">contextual-intelligence.org</text>
  <rect x="690" y="85" width="540" height="2" fill="url(#accent)" rx="1"/>

  <!-- Separator lines -->
  <line x1="420" y1="120" x2="420" y2="1000" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
  <line x1="1500" y1="120" x2="1500" y2="1000" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- LEFT: JETZT ABSTIMMEN -->
  <text x="245" y="350" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="700" fill="url(#votingGrad)" text-anchor="middle" letter-spacing="8">JETZT</text>
  <text x="245" y="450" font-family="'Segoe UI',Arial,sans-serif" font-size="60" font-weight="800" fill="url(#votingGrad)" text-anchor="middle" letter-spacing="5">ABSTIMMEN!</text>

  <rect x="140" y="520" width="210" height="60" rx="30" fill="url(#votingGrad)" opacity="0.8"/>
  <text x="245" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="700" fill="#0f172a" text-anchor="middle">#BMW2026</text>

  <text x="245" y="640" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#cbd5e1" text-anchor="middle">Business Model</text>
  <text x="245" y="670" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#cbd5e1" text-anchor="middle">Competition 2026</text>

  <!-- RIGHT: TAKEAWAY SLOGAN -->
  <text x="1675" y="320" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="3">Contextual Intelligence</text>
  <line x1="1550" y1="350" x2="1800" y2="350" stroke="#475569" stroke-width="0.5" opacity="0.4"/>

  <text x="1675" y="410" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="600" fill="#e2e8f0" text-anchor="middle">Regulatory Signals</text>
  <text x="1675" y="460" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="600" fill="#e2e8f0" text-anchor="middle">→ echte Leads</text>
  <text x="1675" y="510" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="600" fill="#e2e8f0" text-anchor="middle">→ klarer Vertrieb</text>

  <line x1="1550" y1="550" x2="1800" y2="550" stroke="#475569" stroke-width="0.5" opacity="0.4"/>

  <text x="1675" y="610" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#06b6d4" text-anchor="middle">orsd.contextual-intelligence.org</text>

  <!-- Footer -->
  <text x="960" y="1040" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="600" fill="#cbd5e1" text-anchor="middle" letter-spacing="4">Self-Bootstrap · Nebenerwerb · Eigenfinanziert</text>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
