<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ctaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="votingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="ringFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="30" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>

  <rect x="0" y="0" width="1920" height="4" fill="url(#accent)"/>

  <g transform="translate(40, 30) scale(0.35)">
    <polygon points="140,0 260,75 260,225 140,300 20,225 20,75" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.25"/>
    <circle cx="140" cy="150" r="28" fill="url(#accent)" opacity="0.4"/>
  </g>

  <ellipse cx="960" cy="130" rx="350" ry="100" fill="url(#accent)" opacity="0.06" filter="url(#softGlow)"/>

  <!-- ===== TITLE ===== -->
  <text x="960" y="100" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="16" text-anchor="middle" filter="url(#glow)">CALL TO ACTION</text>
  <text x="960" y="145" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="6" text-anchor="middle">Contextual Intelligence aus Marburg</text>
  <rect x="840" y="165" width="240" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- ===== LEFT: Voting CTA ===== -->
  <rect x="45" y="290" width="400" height="250" rx="16" fill="url(#ctaBg)" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="245" y="350" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="700" fill="url(#votingGrad)" letter-spacing="4" text-anchor="middle" filter="url(#glow)">JETZT ABSTIMMEN!</text>
  <text x="245" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle">Unterstütze Contextual Intelligence</text>
  <text x="245" y="415" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">beim Business Model Competition 2026</text>

  <rect x="125" y="455" width="240" height="52" rx="26" fill="url(#votingGrad)" opacity="0.9"/>
  <text x="245" y="488" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">#BMW2026</text>

  <!-- ===== RIGHT: Product cards ===== -->
  <rect x="1470" y="290" width="400" height="120" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="1500" cy="325" r="18" fill="#06b6d4" opacity="0.15"/>
  <text x="1500" y="331" font-family="Arial,sans-serif" font-size="16" fill="#06b6d4" text-anchor="middle">O</text>
  <text x="1528" y="331" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">ORSD — Open Regulatory Signal Dataset</text>
  <text x="1485" y="362" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#94a3b8">Offener Datensatz für regulatorische Signale</text>
  <text x="1485" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#06b6d4">orsd.contextual-intelligence.org</text>

  <rect x="1470" y="425" width="400" height="120" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="1500" cy="460" r="18" fill="#6366f1" opacity="0.15"/>
  <text x="1500" y="466" font-family="Arial,sans-serif" font-size="16" fill="#6366f1" text-anchor="middle">C</text>
  <text x="1528" y="466" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">CI Platform — Lead Intelligence</text>
  <text x="1485" y="497" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#94a3b8">Lead Intelligence für Hightech-Vertrieb</text>
  <text x="1485" y="525" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#6366f1">contextual-intelligence.org</text>

  <rect x="1470" y="560" width="400" height="120" rx="12" fill="#1e293b" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="1500" cy="595" r="18" fill="#06b6d4" opacity="0.12"/>
  <text x="1500" y="601" font-family="Arial,sans-serif" font-size="16" fill="#06b6d4" text-anchor="middle">C</text>
  <text x="1528" y="601" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">CRS — Compliance Schema</text>
  <text x="1485" y="632" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#94a3b8">Offenes, graph-basiertes Compliance-Schema</text>
  <text x="1485" y="660" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#06b6d4">compliance.contextual-intelligence.org</text>

  <!-- ===== BOTTOM: Logo + radiating rings ===== -->
  <rect x="0" y="880" width="1920" height="200" fill="#1e293b" opacity="0.4"/>

  <g transform="translate(960, 920)">
    <!-- Radiating signal rings -->
    <circle cx="0" cy="0" r="60" fill="url(#ringFade)" opacity="0.5"/>
    <circle cx="0" cy="0" r="90" fill="url(#ringFade)" opacity="0.3"/>
    <circle cx="0" cy="0" r="120" fill="url(#ringFade)" opacity="0.15"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#06b6d4" stroke-width="0.5" stroke-dasharray="2,8" opacity="0.2"/>

    <polygon points="0,-50 92,-25 92,25 0,50 -92,25 -92,-25" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
    <circle cx="0" cy="0" r="22" fill="url(#accent)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="-38" r="8" fill="#06b6d4" opacity="0.6"/>
    <circle cx="33" cy="-19" r="6" fill="#6366f1" opacity="0.5"/>
    <circle cx="33" cy="19" r="6" fill="#06b6d4" opacity="0.5"/>
    <circle cx="0" cy="38" r="8" fill="#6366f1" opacity="0.6"/>
    <circle cx="-33" cy="19" r="6" fill="#06b6d4" opacity="0.5"/>
    <circle cx="-33" cy="-19" r="6" fill="#6366f1" opacity="0.5"/>
  </g>

  <text x="960" y="1005" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="8" text-anchor="middle">CONTEXTUAL INTELLIGENCE</text>
  <line x1="820" y1="1020" x2="1100" y2="1020" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
  <text x="960" y="1045" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="400" fill="#94a3b8" letter-spacing="5" text-anchor="middle">LEAD · GRANT · REGULATORY · SIGNAL INTELLIGENCE</text>
  <text x="960" y="1065" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#475569" letter-spacing="3" text-anchor="middle">Eigene KI · Eigene Hardware · Datenschutz-konform</text>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
