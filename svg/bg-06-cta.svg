<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ctaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="votingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="30" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>

  <rect x="0" y="0" width="1920" height="4" fill="url(#accent)"/>

  <g transform="translate(40, 30) scale(0.35)">
    <polygon points="140,0 260,75 260,225 140,300 20,225 20,75" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.25"/>
    <circle cx="140" cy="150" r="28" fill="url(#accent)" opacity="0.4"/>
  </g>

  <ellipse cx="960" cy="130" rx="350" ry="100" fill="url(#accent)" opacity="0.06" filter="url(#softGlow)"/>

  <text x="960" y="120" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="16" text-anchor="middle" filter="url(#glow)">CALL TO ACTION</text>
  <rect x="840" y="145" width="240" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- LEFT: Voting CTA -->
  <rect x="60" y="280" width="460" height="500" rx="18" fill="url(#ctaBg)" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="290" y="400" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="700" fill="url(#votingGrad)" letter-spacing="6" text-anchor="middle" filter="url(#glow)">JETZT</text>
  <text x="290" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="800" fill="url(#votingGrad)" letter-spacing="10" text-anchor="middle" filter="url(#glow)">ABSTIMMEN!</text>

  <rect x="170" y="560" width="240" height="70" rx="35" fill="url(#votingGrad)" opacity="0.9"/>
  <text x="290" y="606" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#0f172a" text-anchor="middle">#BMW2026</text>

  <text x="290" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">Business Model Competition 2026</text>

  <!-- RIGHT: Product cards -->
  <rect x="600" y="280" width="420" height="150" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="640" cy="330" r="22" fill="#06b6d4" opacity="0.15"/>
  <text x="640" y="337" font-family="Arial,sans-serif" font-size="22" fill="#06b6d4" text-anchor="middle">O</text>
  <text x="675" y="337" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#e2e8f0">ORSD</text>
  <text x="620" y="385" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#94a3b8">Open Regulatory Signal Dataset</text>

  <rect x="600" y="450" width="420" height="150" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="640" cy="500" r="22" fill="#6366f1" opacity="0.15"/>
  <text x="640" y="507" font-family="Arial,sans-serif" font-size="22" fill="#6366f1" text-anchor="middle">C</text>
  <text x="675" y="507" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#e2e8f0">CI PLATFORM</text>
  <text x="620" y="555" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#94a3b8">Lead Intelligence</text>

  <rect x="600" y="620" width="420" height="150" rx="14" fill="#1e293b" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="640" cy="670" r="22" fill="#06b6d4" opacity="0.12"/>
  <text x="640" y="677" font-family="Arial,sans-serif" font-size="22" fill="#06b6d4" text-anchor="middle">C</text>
  <text x="675" y="677" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#e2e8f0">CRS</text>
  <text x="620" y="725" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#94a3b8">Compliance Requirement Schema</text>

  <!-- BOTTOM: Brand -->
  <rect x="0" y="880" width="1920" height="200" fill="#1e293b" opacity="0.4"/>

  <g transform="translate(960, 920)">
    <polygon points="0,-55 95,-28 95,28 0,55 -95,28 -95,-28" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="25" fill="url(#accent)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="#ffffff" opacity="0.9"/>
  </g>

  <text x="960" y="1010" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="8" text-anchor="middle">CONTEXTUAL INTELLIGENCE</text>
  <line x1="820" y1="1025" x2="1100" y2="1025" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
  <text x="960" y="1060" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#475569" letter-spacing="3" text-anchor="middle">Eigene KI · Eigene Hardware · Datenschutz-konform</text>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
