  <rect x="460" y="800" width="1000" height="3" rx="1.5" fill="url(#connLine)"/>

  <rect x="1460" y="285" width="420" height="540" rx="10" fill="url(#actGrad)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.25"/>
