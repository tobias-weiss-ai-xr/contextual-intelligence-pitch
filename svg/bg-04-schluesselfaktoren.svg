<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="colGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="connLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="320" y1="0" x2="320" y2="1080"/><line x1="640" y1="0" x2="640" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/><line x1="1280" y1="0" x2="1280" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>
  <rect x="0" y="0" width="1920" height="4" fill="url(#accent)"/>

  <g transform="translate(40, 30) scale(0.35)">
    <polygon points="140,0 260,75 260,225 140,300 20,225 20,75" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.25"/>
    <circle cx="140" cy="150" r="28" fill="url(#accent)" opacity="0.4"/>
  </g>

  <text x="960" y="130" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="12" text-anchor="middle" filter="url(#glow)">SCHLÜSSELFAKTOREN</text>
  <rect x="740" y="150" width="440" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- RESSOURCEN -->
  <rect x="40" y="280" width="440" height="560" rx="12" fill="url(#colGrad)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="40" y="280" width="440" height="50" rx="12" fill="#06b6d4" opacity="0.1"/>
  <rect x="40" y="318" width="440" height="12" fill="#06b6d4" opacity="0.06"/>
  <text x="260" y="312" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#06b6d4" letter-spacing="4" text-anchor="middle">RESSOURCEN</text>

  <g transform="translate(55, 350)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Datenbank (Dgraph + PostgreSQL)</text>
  </g>
  <g transform="translate(55, 425)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Open-Source Foundation Modelle</text>
  </g>
  <g transform="translate(55, 500)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Crawler-Adapter</text>
  </g>
  <g transform="translate(55, 575)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">ORSD Dataset</text>
  </g>
  <g transform="translate(55, 650)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Scoring Engine + AI Agents</text>
  </g>

  <!-- PARTNER -->
  <rect x="40" y="720" width="440" height="130" rx="12" fill="url(#colGrad)" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.2"/>
  <text x="260" y="752" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#06b6d4" letter-spacing="4" text-anchor="middle">PARTNER</text>

  <g transform="translate(55, 770)">
    <rect x="0" y="0" width="200" height="40" rx="4" fill="#1e293b" opacity="0.5"/>
    <text x="10" y="26" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="500" fill="#e2e8f0">Hetzner</text>
  </g>

  <g transform="translate(55, 820)">
    <rect x="0" y="0" width="200" height="40" rx="4" fill="#1e293b" opacity="0.5"/>
    <text x="10" y="26" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="500" fill="#e2e8f0">Uni Marburg (MAFEX), StartMiUp</text>
  </g>
  <g transform="translate(265, 820)">
    <rect x="0" y="0" width="200" height="40" rx="4" fill="#1e293b" opacity="0.5"/>
    <text x="10" y="26" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="500" fill="#e2e8f0">DFN</text>
  </g>

  <!-- Connection indicator -->
  <rect x="480" y="540" width="1000" height="3" rx="1.5" fill="url(#connLine)"/>

  <!-- AKTIVITÄTEN -->
  <rect x="1440" y="280" width="440" height="580" rx="12" fill="url(#colGrad)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="1440" y="280" width="440" height="50" rx="12" fill="#6366f1" opacity="0.1"/>
  <rect x="1440" y="318" width="440" height="12" fill="#6366f1" opacity="0.08"/>
  <text x="1660" y="312" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#6366f1" letter-spacing="4" text-anchor="middle">AKTIVITÄTEN</text>

  <g transform="translate(1455, 350)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Crawler-Wartung</text>
  </g>
  <g transform="translate(1455, 425)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Embedding-Tuning</text>
  </g>
  <g transform="translate(1455, 500)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">AI-Agent-Entwicklung</text>
  </g>
  <g transform="translate(1455, 575)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Content-Marketing</text>
  </g>
  <g transform="translate(1455, 650)">
    <rect x="0" y="0" width="410" height="60" rx="6" fill="#1e293b" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">ORSD Community</text>
  </g>

  <!-- SELF-BOOTSTRAP bottom bar -->
  <rect x="0" y="880" width="1920" height="200" fill="#1e293b" opacity="0.5"/>

  <g transform="translate(960, 955)">
    <rect x="-300" y="-25" width="600" height="70" rx="35" fill="url(#accent)" opacity="0.10" stroke="url(#accent)" stroke-width="1"/>
    <text x="0" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="28" fill="#e2e8f0" text-anchor="middle">
      <tspan font-weight="700" fill="#06b6d4">SELF-BOOTSTRAP</tspan>
      <tspan fill="#94a3b8"> — Nebenerwerb · Kein Fremdkapital</tspan>
    </text>
  </g>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
