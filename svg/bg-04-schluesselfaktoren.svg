<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="bgBlur"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
      <stop offset="40%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <circle cx="350" cy="350" r="280" fill="#06b6d4" opacity="0.05" filter="url(#bgBlur)"/>
  <circle cx="1500" cy="700" r="250" fill="#6366f1" opacity="0.04" filter="url(#bgBlur)"/>

  <!-- Logo -->
  <g transform="translate(1770, 55)">
    <polygon points="0,-48 84,-24 84,24 0,48 -84,24 -84,-24" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
    <circle cx="0" cy="0" r="22" fill="url(#accent)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="9" fill="#ffffff" opacity="0.9"/>
  </g>
  <text x="1770" y="120" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="3" text-anchor="middle">CONTEXTUAL INTELLIGENCE</text>
  <text x="1770" y="138" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">orsd.contextual-intelligence.org</text>
  <line x1="1690" y1="148" x2="1850" y2="148" stroke="#94a3b8" stroke-width="0.5" opacity="0.3"/>

  <!-- Title -->
  <text x="960" y="70" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="8" text-anchor="middle">SCHLÜSSELFAKTOREN</text>
  <rect x="780" y="85" width="360" height="2" fill="url(#accent)" rx="1"/>

  <!-- Separator lines -->
  <line x1="420" y1="120" x2="420" y2="1000" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
  <line x1="1500" y1="120" x2="1500" y2="1000" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

