  <text x="150" y="510" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#e2e8f0">Unternehmensregister</text>
  <text x="150" y="570" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#e2e8f0">MDR / IVDR</text>
  <text x="150" y="630" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#e2e8f0">Klinische Studien</text>

