  <line x1="150" y1="200" x2="340" y2="200" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>

  <circle cx="165" cy="257" r="6" fill="#06b6d4" opacity="0.7"/>
  <circle cx="165" cy="317" r="6" fill="#6366f1" opacity="0.7"/>
  <circle cx="165" cy="377" r="6" fill="#22c55e" opacity="0.7"/>
  <circle cx="165" cy="437" r="6" fill="#f59e0b" opacity="0.7"/>
