  <text x="1530" y="630" font-family="'Segoe UI',Arial,sans-serif" font-size="26" fill="#e2e8f0">Open-Source FM</text>

  <text x="1675" y="720" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#6366f1" letter-spacing="3" text-anchor="middle">10 REGULATOREN</text>

