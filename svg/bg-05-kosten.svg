<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="60%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>

  <rect x="0" y="0" width="1920" height="4" fill="url(#accent)"/>

  <g transform="translate(40, 30) scale(0.35)">
    <polygon points="140,0 260,75 260,225 140,300 20,225 20,75" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.25"/>
    <circle cx="140" cy="150" r="28" fill="url(#accent)" opacity="0.4"/>
  </g>

  <text x="960" y="100" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="12" text-anchor="middle" filter="url(#glow)">KOSTENSTRUKTUR</text>
  <rect x="840" y="115" width="240" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- ===== LEFT: Cost bars ===== -->
  <rect x="40" y="280" width="420" height="560" rx="16" fill="#1e293b" opacity="0.4"/>
  <text x="250" y="315" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#06b6d4" letter-spacing="3" text-anchor="middle">MONATLICHE KOSTEN (Y1)</text>

  <text x="60" y="345" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">LLM-Inferenz (30%)</text>
  <text x="440" y="345" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="end">~€300</text>
  <rect x="60" y="355" width="380" height="6" rx="3" fill="#1e293b"/>
  <rect x="60" y="355" width="114" height="6" rx="3" fill="url(#accent)"/>
  <text x="60" y="375" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#64748b">Self-hosted: GPU-Abschreibung + Strom statt API-Miete</text>

  <text x="60" y="405" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Hosting (22%)</text>
  <text x="440" y="405" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="end">~€225</text>
  <rect x="60" y="415" width="380" height="6" rx="3" fill="#1e293b"/>
  <rect x="60" y="415" width="84" height="6" rx="3" fill="#6366f1"/>
  <text x="60" y="435" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#64748b">Hetzner VPS + Docker · EU-Hosting</text>

  <text x="60" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">API-Kosten (12%)</text>
  <text x="440" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="end">~€120</text>
  <rect x="60" y="475" width="380" height="6" rx="3" fill="#1e293b"/>
  <rect x="60" y="475" width="46" height="6" rx="3" fill="#06b6d4"/>
  <text x="60" y="495" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#64748b">z.ai API · Domain · SSL</text>

  <text x="60" y="525" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Entwicklung (30%)</text>
  <text x="440" y="525" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="end">~€300</text>
  <rect x="60" y="535" width="380" height="6" rx="3" fill="#1e293b"/>
  <rect x="60" y="535" width="114" height="6" rx="3" fill="#6366f1" opacity="0.6"/>
  <text x="60" y="555" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#64748b">Eigenleistung (Gründer-Team)</text>

  <text x="60" y="585" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Marketing (15%)</text>
  <text x="440" y="585" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="end">~€150</text>
  <rect x="60" y="595" width="380" height="6" rx="3" fill="#1e293b"/>
  <rect x="60" y="595" width="57" height="6" rx="3" fill="#06b6d4" opacity="0.5"/>

  <line x1="60" y1="625" x2="440" y2="625" stroke="#475569" stroke-width="1"/>
  <text x="60" y="655" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Total Monthly Burn:</text>
  <text x="440" y="655" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="700" fill="#22c55e" text-anchor="end">€1.000–€2.000</text>
  <text x="440" y="675" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#64748b" text-anchor="end">Kein Gründungsgehalt (Nebenerwerb)</text>

  <!-- ===== RIGHT: Stats + Gauge backdrop ===== -->
  <!-- Gauge arc behind Break-Even -->
  <path d="M 1550,400 A 120,120 0 0,1 1790,400" fill="none" stroke="#1e293b" stroke-width="12" opacity="0.3"/>
  <path d="M 1550,400 A 120,120 0 0,1 1700,305" fill="none" stroke="url(#gaugeGrad)" stroke-width="12" stroke-linecap="round" opacity="0.5"/>

  <rect x="1470" y="290" width="400" height="130" rx="12" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1670" y="330" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="600" fill="#22c55e" letter-spacing="5" text-anchor="middle">BREAK-EVEN</text>
  <text x="1670" y="370" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">bei €1.500 mtl. Einnahmen</text>
  <text x="1670" y="398" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Kostendeckung ab dem ersten Zahlenden Kunden</text>

  <rect x="1470" y="440" width="400" height="130" rx="12" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1670" y="480" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="600" fill="#22c55e" text-anchor="middle">Gross Margin (Y1)</text>
  <text x="1670" y="525" font-family="'Segoe UI',Arial,sans-serif" font-size="42" font-weight="700" fill="#22c55e" text-anchor="middle">80%</text>
  <text x="1670" y="548" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">→ 95% in Y5</text>

  <rect x="1470" y="590" width="400" height="130" rx="12" fill="#06b6d4" opacity="0.06" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1670" y="630" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="600" fill="#06b6d4" text-anchor="middle">Profitabel ab</text>
  <text x="1670" y="675" font-family="'Segoe UI',Arial,sans-serif" font-size="42" font-weight="700" fill="#06b6d4" text-anchor="middle">Tag 1</text>
  <text x="1670" y="698" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Jeder Kunde = ab ersten € profitabel</text>

  <!-- ===== BOTTOM ===== -->
  <rect x="40" y="900" width="1840" height="155" rx="16" fill="#1e293b" opacity="0.5"/>
  <text x="960" y="940" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="#06b6d4" letter-spacing="3" text-anchor="middle">SELF-BOOTSTRAP — DAS GESCHÄFTSMODELL TRÄGT SICH SELBST</text>
  <text x="960" y="972" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">Kein Gründungsgehalt · Kein Fremdkapital · Vollständig eigenfinanziert · Nebenerwerb</text>
  <text x="960" y="1000" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Break-Even bei ~5 Kunden · Der erste bezahlte Kunde deckt die Kosten · Freiheit ohne Investoren</text>

  <circle cx="140" cy="1030" r="5" fill="#06b6d4" opacity="0.7"/>
  <text x="156" y="1035" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#94a3b8">Self-hosted FM: <tspan fill="#e2e8f0">Fixkostendominiert</tspan></text>

  <circle cx="720" cy="1030" r="5" fill="#6366f1" opacity="0.7"/>
  <text x="736" y="1035" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#94a3b8">Hosting: <tspan fill="#e2e8f0">sublinear (Dgraph + Postgres teilen)</tspan></text>

  <circle cx="1300" cy="1030" r="5" fill="#06b6d4" opacity="0.7"/>
  <text x="1316" y="1035" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#94a3b8">COGS pro aktivem Nutzer: <tspan fill="#e2e8f0">€2–5/Monat (&lt;5% vom ARPU)</tspan></text>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
