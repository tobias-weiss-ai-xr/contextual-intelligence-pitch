<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>

  <rect x="0" y="0" width="1920" height="4" fill="url(#accent)"/>

  <g transform="translate(40, 30) scale(0.35)">
    <polygon points="140,0 260,75 260,225 140,300 20,225 20,75" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.25"/>
    <circle cx="140" cy="150" r="28" fill="url(#accent)" opacity="0.4"/>
  </g>

  <text x="960" y="130" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="12" text-anchor="middle" filter="url(#glow)">KOSTENSTRUKTUR</text>
  <rect x="840" y="150" width="240" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- LEFT: Cost bars -->
  <rect x="40" y="240" width="480" height="620" rx="16" fill="#1e293b" opacity="0.4"/>
  <text x="280" y="280" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="#06b6d4" letter-spacing="3" text-anchor="middle">MONATLICHE KOSTEN (Y1)</text>

  <!-- Bar 1 -->
  <text x="65" y="325" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">LLM-Inferenz</text>
  <text x="495" y="325" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#94a3b8" text-anchor="end">~€300</text>
  <rect x="65" y="340" width="450" height="12" rx="6" fill="#1e293b"/>
  <rect x="65" y="340" width="135" height="12" rx="6" fill="url(#accent)"/>

  <!-- Bar 2 -->
  <text x="65" y="395" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Hosting</text>
  <text x="495" y="395" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#94a3b8" text-anchor="end">~€225</text>
  <rect x="65" y="410" width="450" height="12" rx="6" fill="#1e293b"/>
  <rect x="65" y="410" width="100" height="12" rx="6" fill="#6366f1"/>

  <!-- Bar 3 -->
  <text x="65" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">API-Kosten</text>
  <text x="495" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#94a3b8" text-anchor="end">~€120</text>
  <rect x="65" y="480" width="450" height="12" rx="6" fill="#1e293b"/>
  <rect x="65" y="480" width="55" height="12" rx="6" fill="#06b6d4"/>

  <!-- Bar 4 -->
  <text x="65" y="535" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Entwicklung</text>
  <text x="495" y="535" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#94a3b8" text-anchor="end">~€300</text>
  <rect x="65" y="550" width="450" height="12" rx="6" fill="#1e293b"/>
  <rect x="65" y="550" width="135" height="12" rx="6" fill="#6366f1" opacity="0.6"/>

  <!-- Bar 5 -->
  <text x="65" y="605" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Marketing</text>
  <text x="495" y="605" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#94a3b8" text-anchor="end">~€150</text>
  <rect x="65" y="620" width="450" height="12" rx="6" fill="#1e293b"/>
  <rect x="65" y="620" width="68" height="12" rx="6" fill="#06b6d4" opacity="0.5"/>

  <!-- Total -->
  <line x1="65" y1="750" x2="495" y2="750" stroke="#475569" stroke-width="1"/>
  <text x="65" y="795" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="600" fill="#e2e8f0">Total Monthly Burn</text>
  <text x="495" y="795" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#22c55e" text-anchor="end">€1.000–€2.000</text>

  <!-- RIGHT: Stat cards -->
  <rect x="580" y="240" width="640" height="170" rx="14" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="900" y="295" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#22c55e" letter-spacing="5" text-anchor="middle">BREAK-EVEN</text>
  <text x="900" y="365" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">bei €1.500 / Monat</text>

  <rect x="580" y="430" width="310" height="170" rx="14" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="735" y="485" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="#22c55e" text-anchor="middle">Gross Margin (Y1)</text>
  <text x="735" y="555" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="700" fill="#22c55e" text-anchor="middle">80%</text>

  <rect x="910" y="430" width="310" height="170" rx="14" fill="#06b6d4" opacity="0.06" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1065" y="485" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="#06b6d4" text-anchor="middle">Profitabel ab</text>
  <text x="1065" y="555" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="700" fill="#06b6d4" text-anchor="middle">Tag 1</text>

  <!-- Key metrics row -->
  <rect x="580" y="620" width="640" height="100" rx="10" fill="#1e293b" opacity="0.5"/>
  <text x="900" y="665" font-family="'Segoe UI',Arial,sans-serif" font-size="24" fill="#e2e8f0" text-anchor="middle">
    <tspan font-weight="700" fill="#22c55e">Break-even bei ~5 Kunden</tspan>
    <tspan fill="#64748b"> · Erster Kunde deckt Kosten</tspan>
  </text>
  <text x="900" y="700" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#64748b" text-anchor="middle">Kein Gründungsgehalt · Nebenerwerb · Vollständig eigenfinanziert</text>

  <!-- BOTTOM: SELF-BOOTSTRAP FRAME -->
  <rect x="0" y="870" width="1920" height="210" fill="#1e293b" opacity="0.45"/>
  <rect x="160" y="888" width="1600" height="174" rx="16" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>
  <rect x="164" y="892" width="1592" height="166" rx="14" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.25"/>
  <text x="960" y="945" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="600" fill="#06b6d4" letter-spacing="3" text-anchor="middle">SELF-BOOTSTRAP — DAS GESCHÄFTSMODELL TRÄGT SICH SELBST</text>
  <text x="960" y="1005" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#e2e8f0" text-anchor="middle">Kein Fremdkapital · Eigenfinanziert · Nebenerwerb</text>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
