<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="bgBlur">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="40%" r="70%">
      <stop offset="40%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Blurred accent orbs -->
  <circle cx="540" cy="500" r="280" fill="#06b6d4" opacity="0.12" filter="url(#bgBlur)"/>
  <circle cx="250" cy="1100" r="220" fill="#6366f1" opacity="0.08" filter="url(#bgBlur)"/>
  <circle cx="830" cy="1500" r="200" fill="#06b6d4" opacity="0.06" filter="url(#bgBlur)"/>

  <!-- Logo glow -->
  <circle cx="540" cy="360" r="140" fill="url(#accent)" filter="url(#softGlow)" opacity="0.35"/>

  <!-- Logo -->
  <g transform="translate(540, 360)">
    <polygon points="0,-110 190,-55 190,55 0,110 -190,55 -190,-55" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.35"/>
    <circle cx="0" cy="0" r="50" fill="url(#accent)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="20" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="-83" r="18" fill="#06b6d4" opacity="0.45"/>
    <circle cx="72" cy="-41" r="15" fill="#6366f1" opacity="0.35"/>
    <circle cx="72" cy="41" r="15" fill="#06b6d4" opacity="0.35"/>
    <circle cx="0" cy="83" r="18" fill="#6366f1" opacity="0.45"/>
    <circle cx="-72" cy="41" r="15" fill="#06b6d4" opacity="0.35"/>
    <circle cx="-72" cy="-41" r="15" fill="#6366f1" opacity="0.35"/>
  </g>

  <!-- Brand name -->
  <text x="540" y="590" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="10" text-anchor="middle">CONTEXTUAL</text>
  <text x="540" y="655" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="10" text-anchor="middle">INTELLIGENCE</text>
  <text x="540" y="710" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#475569" letter-spacing="5" text-anchor="middle">Deep Tech · Made in Hessen</text>

  <!-- Vignette -->
  <rect width="1080" height="1920" fill="url(#vignette)" pointer-events="none"/>

</svg>
