  <text x="960" y="700" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="6" text-anchor="middle">INTELLIGENCE</text>
  <text x="960" y="750" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#475569" letter-spacing="3" text-anchor="middle">Deep Tech · Made in Hessen</text>

