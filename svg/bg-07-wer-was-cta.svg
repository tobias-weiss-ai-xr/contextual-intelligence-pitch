    <circle cx="0" cy="0" r="14" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="-60" r="12" fill="#06b6d4" opacity="0.5"/>
    <circle cx="52" cy="-30" r="10" fill="#6366f1" opacity="0.4"/>
    <circle cx="52" cy="30" r="10" fill="#06b6d4" opacity="0.4"/>
    <circle cx="0" cy="60" r="12" fill="#6366f1" opacity="0.5"/>
    <circle cx="-52" cy="30" r="10" fill="#06b6d4" opacity="0.4"/>
    <circle cx="-52" cy="-30" r="10" fill="#6366f1" opacity="0.4"/>
