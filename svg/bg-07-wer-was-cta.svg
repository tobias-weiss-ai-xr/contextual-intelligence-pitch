<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="colBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="votingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="40" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>

  <rect x="0" y="0" width="1920" height="4" fill="url(#accent)"/>

  <!-- ===== TOP STRIP ===== -->
  <text x="960" y="120" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="20" text-anchor="middle" filter="url(#glow)">WER · WAS · CTA</text>
  <line x1="760" y1="150" x2="1160" y2="150" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>

  <!-- ===== LEFT: WER ===== -->
  <g transform="translate(40, 220)">
    <rect x="0" y="0" width="420" height="640" rx="16" fill="url(#colBg)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.2"/>

    <rect x="0" y="0" width="420" height="55" rx="16" fill="#06b6d4" fill-opacity="0.08"/>
    <rect x="0" y="43" width="420" height="12" fill="#06b6d4" fill-opacity="0.06"/>
    <circle cx="28" cy="28" r="18" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <text x="28" y="34" font-family="Arial,sans-serif" font-size="18" fill="#06b6d4" text-anchor="middle" font-weight="700">W</text>
    <text x="60" y="35" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="700" fill="#06b6d4" letter-spacing="4">WER</text>

    <!-- Tobias -->
    <rect x="15" y="75" width="390" height="100" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
    <text x="30" y="115" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#e2e8f0">Tobias Weiß</text>
    <text x="30" y="155" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8">KI / DevOps</text>

    <!-- Marc -->
    <rect x="15" y="195" width="390" height="100" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="30" y="235" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#e2e8f0">Marc Viel</text>
    <text x="30" y="275" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8">Requirements Engineering</text>

    <!-- Team badge -->
    <rect x="15" y="320" width="390" height="50" rx="25" fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
    <text x="210" y="352" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="3">TEAM · MARBURG + FRANKFURT</text>

    <!-- LOEWE -->
    <rect x="15" y="400" width="390" height="60" rx="8" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="3"/>
    <text x="30" y="428" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="600" fill="#64748b">LOEWE-Forschungsverbund</text>
    <text x="30" y="450" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#475569">Universität Gießen + Marburg</text>
