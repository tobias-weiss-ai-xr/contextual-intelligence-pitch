    <rect x="15" y="75" width="390" height="190" rx="14" fill="url(#ctaGrad)" stroke="url(#votingGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="210" y="135" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="6">JETZT</text>
    <text x="210" y="195" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="800" fill="url(#votingGrad)" text-anchor="middle" letter-spacing="10">ABSTIMMEN!</text>
    <text x="210" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle">Business Model Wettbewerb 2026</text>

    <rect x="15" y="290" width="390" height="60" rx="30" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
    <text x="210" y="328" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="4">#BMW2026</text>

    <rect x="15" y="380" width="390" height="80" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-opacity="0.3"/>
    <text x="30" y="415" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">Testet es jetzt:</text>
    <text x="30" y="445" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#06b6d4">orsd.contextual-intelligence.org</text>

    <text x="210" y="580" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#475569" text-anchor="middle">Nebenerwerb · Eigenfinanziert · Seit 2024</text>
  </g>

  <!-- ===== BOTTOM: WAS bar ===== -->
  <g transform="translate(0, 880)">
    <line x1="0" y1="0" x2="1920" y2="0" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.12"/>

    <rect x="40" y="12" width="1840" height="55" rx="28" fill="url(#colBg)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.2"/>

    <circle cx="65" cy="40" r="16" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="65" y="46" font-family="Arial,sans-serif" font-size="14" fill="#6366f1" text-anchor="middle" font-weight="700">W</text>
    <text x="90" y="47" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="4">WAS</text>

    <text x="210" y="47" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#e2e8f0">ORSD: Kostenlos</text>
    <circle cx="395" cy="40" r="3" fill="#475569"/>
    <text x="415" y="47" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#06b6d4">CI: ab €299/Monat</text>
    <circle cx="680" cy="40" r="3" fill="#475569"/>
    <text x="700" y="47" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8">Self-hosted</text>
    <circle cx="855" cy="40" r="3" fill="#475569"/>
    <text x="875" y="47" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8">Datenschutz</text>
    <circle cx="1030" cy="40" r="3" fill="#475569"/>
    <text x="1050" y="47" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#6366f1">2× NVIDIA DGX</text>

    <text x="960" y="95" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#64748b" letter-spacing="3" text-anchor="middle">CONTEXTUAL INTELLIGENCE · LEAD · GRANT · REGULATORY · SIGNAL INTELLIGENCE</text>
  </g>

  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>
