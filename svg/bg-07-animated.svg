<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="bgBlur">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="40%" r="70%">
      <stop offset="40%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Blurred accent orbs -->
  <circle cx="540" cy="500" r="280" fill="#06b6d4" opacity="0.12" filter="url(#bgBlur)"/>
  <circle cx="250" cy="1100" r="220" fill="#6366f1" opacity="0.08" filter="url(#bgBlur)"/>
  <circle cx="830" cy="1500" r="200" fill="#06b6d4" opacity="0.06" filter="url(#bgBlur)"/>

  <!-- Logo glow: pulse animation -->
  <circle cx="540" cy="440" r="140" fill="url(#accent)" filter="url(#softGlow)" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0.25;0.35" dur="4s" begin="0.5s" fill="freeze"/>
  </circle>

  <!-- Logo hexagon: draw-in animation via stroke-dasharray -->
  <g transform="translate(540, 440)">
    <polygon points="0,-110 190,-55 190,55 0,110 -190,55 -190,-55" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0" stroke-dasharray="1200" stroke-dashoffset="1200">
      <animate attributeName="opacity" values="0;0.35" dur="0.3s" begin="0s" fill="freeze"/>
      <animate attributeName="stroke-dashoffset" from="1200" to="0" dur="1.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </polygon>

    <!-- Inner circle: scale-in -->
    <circle cx="0" cy="0" r="50" fill="url(#accent)" filter="url(#glow)" opacity="0" transform="scale(0)">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="scale" from="0" to="1" dur="0.8s" begin="1s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
    </circle>

    <!-- Inner dot -->
    <circle cx="0" cy="0" r="20" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="1.5s" fill="freeze"/>
    </circle>

    <!-- Orbital circles: sequential fade-in + continuous pulse -->
    <circle cx="0" cy="-83" r="18" fill="#06b6d4" opacity="0">
      <animate attributeName="opacity" values="0;0.45;0.3;0.45" dur="3s" begin="1.8s" fill="freeze"/>
    </circle>
    <circle cx="72" cy="-41" r="15" fill="#6366f1" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0.2;0.35" dur="3s" begin="2.0s" fill="freeze"/>
    </circle>
    <circle cx="72" cy="41" r="15" fill="#06b6d4" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0.2;0.35" dur="3s" begin="2.2s" fill="freeze"/>
    </circle>
    <circle cx="0" cy="83" r="18" fill="#6366f1" opacity="0">
      <animate attributeName="opacity" values="0;0.45;0.3;0.45" dur="3s" begin="2.4s" fill="freeze"/>
    </circle>
    <circle cx="-72" cy="41" r="15" fill="#06b6d4" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0.2;0.35" dur="3s" begin="2.6s" fill="freeze"/>
    </circle>
    <circle cx="-72" cy="-41" r="15" fill="#6366f1" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0.2;0.35" dur="3s" begin="2.8s" fill="freeze"/>
    </circle>
  </g>

  <!-- Brand name: fade-in with slight upward motion -->
  <text x="540" y="670" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="10" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1s" begin="2.5s" fill="freeze"/>
    <animate attributeName="y" from="690" to="670" dur="0.8s" begin="2.5s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
    CONTEXTUAL
  </text>
  <text x="540" y="735" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="10" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1s" begin="2.8s" fill="freeze"/>
    <animate attributeName="y" from="755" to="735" dur="0.8s" begin="2.8s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
    INTELLIGENCE
  </text>
  <text x="540" y="790" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#475569" letter-spacing="5" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="3.2s" fill="freeze"/>
    Deep Tech · Made in Hessen
  </text>

  <!-- URL -->
  <text x="540" y="1880" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="36" fill="#06b6d4" letter-spacing="3" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="3.5s" fill="freeze"/>
    orsd.contextual-intelligence.org
  </text>

  <!-- Vignette -->
  <rect width="1080" height="1920" fill="url(#vignette)" pointer-events="none"/>
</svg>
